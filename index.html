<!doctype html>
<html lang="ja" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="ja" />
    <title>JP SEO Bot — 日本市場特化 SEO プラットフォーム</title>
    <meta name="description" content="キーワードを入れるだけで、AI が日本語 SEO 記事(検索意図・E-E-A-T・FAQ 対応)を自動生成。Google 掲載順位は Search Console 連携で記録し、難易度別の最適プランを自動提案します。" />
    <meta name="theme-color" content="#1f44e6" />
    <!-- Open Graph / SNS シェア時のリッチプレビュー -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JP SEO Bot" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:title" content="JP SEO Bot — 日本市場特化 SEO プラットフォーム" />
    <meta property="og:description" content="キーワードを入れるだけで、AI が日本語 SEO 記事(検索意図・E-E-A-T・FAQ 対応)を自動生成。Google 掲載順位は Search Console 連携で記録し、難易度別の最適プランを自動提案します。" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JP SEO Bot — 日本市場特化 SEO プラットフォーム" />
    <meta name="twitter:description" content="キーワードを入れるだけで、AI が日本語 SEO 記事を自動生成。Google 掲載順位は Search Console 連携で記録します。" />
    <!-- 構造化データ(JSON-LD)— SPA は body が空のため、AI/検索クローラが読む実体情報をここに静的に置く -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "JP SEO Bot",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://jp-seo-bot.vercel.app/",
      "inLanguage": "ja",
      "description": "日本市場特化の SEO プラットフォーム。キーワードを入れるだけで AI が日本語 SEO 記事(検索意図・E-E-A-T・FAQ 対応)を自動生成し、Google 掲載順位を Search Console 連携で記録、難易度別の最適プランを自動提案します。",
      "offers": [
        { "@type": "Offer", "name": "かんたんプラン", "price": "3300", "priceCurrency": "JPY", "description": "3 ヶ月で 1 ページ目目標・月額(税込)" },
        { "@type": "Offer", "name": "ふつうプラン", "price": "6600", "priceCurrency": "JPY", "description": "6 ヶ月・月額(税込)" },
        { "@type": "Offer", "name": "むずかしいプラン", "price": "13200", "priceCurrency": "JPY", "description": "10 ヶ月・月額(税込)" }
      ],
      "publisher": {
        "@type": "Organization",
        "name": "株式会社マジック",
        "url": "https://jp-seo-bot.vercel.app/"
      }
    }
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
